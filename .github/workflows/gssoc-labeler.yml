name: GSSoC Labeler

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

jobs:
  label_gssoc:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Check and add GSSoC label
        uses: actions/github-script@v7
        with:
          script: |
            let bodyText = "";
            let issueNum = null;
            
            if (context.payload.issue && context.payload.issue.body) {
              bodyText = context.payload.issue.body;
              issueNum = context.payload.issue.number;
            } else if (context.payload.pull_request && context.payload.pull_request.body) {
              bodyText = context.payload.pull_request.body;
              issueNum = context.payload.pull_request.number;
            }
            
            if (bodyText.indexOf("[x] I am participating in GSSoC 2026") !== -1 || bodyText.indexOf("[X] I am participating in GSSoC 2026") !== -1) {
              if (issueNum) {
                await github.rest.issues.addLabels({
                  issue_number: issueNum,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: ['gssoc26']
                });
              }
            }
